name: Update TFT Stats Card

on:
  schedule:

    - cron: "*/30 * * * *"
  workflow_dispatch: 
  push:
    branches: [main]
    paths:
      - "generate_card.py"

jobs:
  update-card:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate TFT Stats Card
        run: python generate_card.py
        env:
          RIOT_API_KEY: ${{ secrets.RGAPI-1043aa59-105f-4014-b5ca-ff1b33241f65 }}
          RIOT_GAME_NAME: ${{ secrets.cyn }}
          RIOT_TAG_LINE: ${{ secrets.0004 }}
          REGION: "na1"
          ROUTING: "americas"
          MATCH_COUNT: "20"
          OUTPUT_PATH: "tft-stats.svg"

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tft-stats.svg profile-icon.png
          git diff --staged --quiet || (git commit -m "Update TFT stats card" && git push)