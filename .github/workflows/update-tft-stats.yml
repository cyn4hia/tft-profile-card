name: Update TFT Stats Card

on:
  schedule:

    - cron: "*/30 * * * *"
  workflow_dispatch: 
  push:
    branches: [main]
    paths:
      - "generate_card.py"

jobs:
  update-card:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate TFT Stats Card
        run: python generate_card.py
        env:
          PROXY_URL: "${{ secrets.PROXY_URL }}"
          RIOT_GAME_NAME: "${{ secrets.RIOT_GAME_NAME }}"
          RIOT_TAG_LINE: "${{ secrets.RIOT_TAG_LINE }}"
          REGION: "na1"
          ROUTING: "americas"
          MATCH_COUNT: "20"
          OUTPUT_PATH: "tft-stats.svg"

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tft-stats.svg
          git add profile-icon.png 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "Update TFT stats card" && git push)